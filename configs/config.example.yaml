app:
  db_path: data/monomarket.db
  log_level: INFO

trading:
  mode: paper
  enable_live_trading: false
  require_manual_confirm: true
  kill_switch: false

risk:
  max_daily_loss: 250.0
  max_strategy_notional: 1000.0
  max_event_notional: 1500.0
  circuit_breaker_rejections: 5

data:
  gamma_base_url: https://gamma-api.polymarket.com
  data_base_url: https://data-api.polymarket.com
  clob_base_url: https://clob.polymarket.com
  timeout_sec: 15
  max_retries: 2
  backoff_base_sec: 0.5
  rate_limit_per_sec: 4.0
  breaker_failure_threshold: 3
  breaker_cooldown_sec: 90

edge_gate:
  enabled: true
  min_edge_bps: 0.0
  fee_bps: 0.0
  slippage_bps: 5.0
  latency_penalty_bps: 0.0
  liquidity_reference: 1000.0
  liquidity_penalty_max_bps: 0.0
  per_strategy: {}

strategies:
  s1:
    min_spread: 0.03
    min_event_spread: 0.05
    min_liquidity: 80.0
    max_order_notional: 25.0
    max_signals_per_event: 3
    event_notional_cap: 30.0
    inventory_decay: 0.20
    enable_cross_market_arb: true
  s2:
    prob_sum_tolerance: 0.04
    max_order_notional: 15.0
    exclude_event_ids: []
  s4:
    yes_price_min: 0.01
    yes_price_max: 0.15
    min_edge_buffer: 0.015
    min_no_price: 0.82
    min_liquidity: 80.0
    max_order_notional: 20.0
    max_candidates: 40
    max_signals_per_event: 3
    event_notional_cap: 30.0
    inventory_decay: 0.18
    exclude_event_ids: []
    max_candidates: 24
  s8:
    yes_price_max_for_no: 0.25
    hedge_budget_ratio: 0.15
    max_order_notional: 25.0
    max_signals_per_event: 2
    event_notional_cap: 30.0
    inventory_decay: 0.15
    exclude_event_ids: []
  s9:
    min_leg_liquidity: 80.0
    max_order_notional: 12.0
    min_effective_edge_bps: 20.0
    fee_bps: 0.0
    slippage_bps: 6.0
    depth_reference_liquidity: 1000.0
    depth_penalty_max_bps: 30.0
    max_total_cost_bps: 140.0
    liquidity_fraction: 0.01
    min_qty: 1.0
    max_signals: 120
    max_pairs_per_event: 2
    max_event_pair_notional: 20.0
    quote_improve: 0.0
    allow_sell_parity: false
    require_same_event: true
    require_same_condition: true
  s10:
    prob_sum_tolerance: 0.02
    max_abs_deviation: 0.20
    min_leg_liquidity: 80.0
    max_order_notional: 10.0
    min_effective_edge_bps: 30.0
    fee_bps: 0.0
    slippage_bps: 6.0
    depth_reference_liquidity: 1000.0
    depth_penalty_max_bps: 35.0
    liquidity_fraction: 0.01
    min_qty: 1.0
    max_legs_per_event: 24
    min_unique_canonicals: 3
    max_leg_weight: 0.70
    max_weighted_total_cost_bps: 120.0
    max_leg_total_cost_bps: 95.0
    max_signals: 180
    quote_improve: 0.0
    allow_sell_conversion: false
    exclude_event_ids: []
